name: Test

on:
  push:
  pull_request:

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      # Excludes brassworks-launcher (the Tauri shell): its generate_context!
      # needs a built frontend/out + the full webkit toolchain, and it has no
      # tests. This runs the unit tests for the logic crates.
      - name: Run crate unit tests
        run: cargo test --workspace --exclude brassworks-launcher
