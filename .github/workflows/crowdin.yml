name: Crowdin

on:
  push:
    branches: [main]
    paths:
      - frontend/lib/i18n/locales/**
      - crowdin.yml
      - .github/workflows/crowdin.yml
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  synchronize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crowdin upload sources & download translations
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          upload_translations: false
          download_translations: true
          skip_untranslated_strings: true
          push_translations: false
          create_pull_request: false
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      - name: Write translation progress
        run: node .github/scripts/crowdin-progress.mjs
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      - name: Push translations to l10n_crowdin branch
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git checkout -B l10n_crowdin
          git add frontend/lib/i18n/
          if git diff --cached --quiet; then
            echo "No translation changes to push."
            exit 0
          fi
          git commit -m "Update Crowdin translations and progress"
          git push --force origin l10n_crowdin