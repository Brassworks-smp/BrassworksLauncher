name: Crowdin

on:
  push:
    branches: [main]
    paths:
      - frontend/lib/i18n/locales/**
      - crowdin.yml
      - .github/workflows/crowdin.yml
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  synchronize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crowdin upload sources & download translations
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          upload_translations: false
          download_translations: true
          skip_untranslated_strings: true
          push_translations: false
          create_pull_request: false
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      - name: Write translation progress
        run: node .github/scripts/crowdin-progress.mjs
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      - name: Open translations PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: l10n_crowdin
          base: main
          title: New Crowdin translations
          commit-message: Update Crowdin translations and progress
          body: Automated translation + progress update from Crowdin.
          add-paths: frontend/lib/i18n/**