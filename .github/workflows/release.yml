name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (universal)
            runner: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin

          - name: Linux x86_64
            runner: ubuntu-22.04
            rust-targets: x86_64-unknown-linux-gnu
            args: ""

          - name: Linux arm64
            runner: ubuntu-22.04-arm
            rust-targets: aarch64-unknown-linux-gnu
            args: ""

          - name: Windows x86_64
            runner: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            args: ""

          - name: Windows arm64
            runner: windows-11-arm
            rust-targets: aarch64-pc-windows-msvc
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libxdo-dev \
            libsoup-3.0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target
          key: ${{ matrix.name }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: Build and bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_TELEMETRY_DISABLED: "1"
        with:
          projectPath: frontend
          tagName: v__VERSION__
          releaseName: "Brassworks Launcher v__VERSION__"
          releaseBody: "Self-contained installers for macOS, Windows (x64/arm64) and Linux (x64/arm64)."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
