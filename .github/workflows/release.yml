name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    name: Resolve version tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tauri.conf.json
        id: version
        run: |
          VERSION=$(node -p "require('./frontend/src-tauri/tauri.conf.json').version")
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

  build:
    name: Build (${{ matrix.name }})
    needs: version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (universal)
            runner: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin --bundles app

          - name: Linux x86_64
            runner: ubuntu-22.04
            rust-targets: x86_64-unknown-linux-gnu
            args: ""

          - name: Linux arm64
            runner: ubuntu-22.04-arm
            rust-targets: aarch64-unknown-linux-gnu
            args: ""

          - name: Windows x86_64
            runner: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            args: ""

          - name: Windows arm64
            runner: windows-11-arm
            rust-targets: aarch64-pc-windows-msvc
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libxdo-dev \
            libsoup-3.0-dev \
            xdg-utils

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target
          key: ${{ matrix.name }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: Read changelog
        id: changelog
        shell: bash
        run: |
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat changelog.md >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and bundle (Tauri + GitHub Release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: "Brassworks Launcher ${{ needs.version.outputs.tag }}"
          releaseBody: ${{ steps.changelog.outputs.body }}
          # Upload to a DRAFT release: a draft does not create the git tag yet.
          # The publish job below flips it to public once every platform built,
          # and publishing is what creates the tag.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Build and upload styled DMG (macOS)
        if: startsWith(matrix.runner, 'macos')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          brew install create-dmg

          APP="frontend/src-tauri/target/universal-apple-darwin/release/bundle/macos/Brassworks Launcher.app"

          # create-dmg builds the image from the contents of a staging folder,
          # so stage just the .app on its own.
          STAGING="$RUNNER_TEMP/dmg-staging"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -R "$APP" "$STAGING/"

          DMG="$RUNNER_TEMP/Brassworks.dmg"
          rm -f "$DMG"

          # create-dmg occasionally returns non-zero in headless CI even when
          # the image is produced, so retry and verify the file exists.
          for attempt in 1 2 3; do
            create-dmg \
              --volname "Brassworks Launcher" \
              --window-pos 200 120 \
              --window-size 1000 650 \
              --icon-size 100 \
              --background "$GITHUB_WORKSPACE/frontend/public/dmg-scaled.png" \
              --icon "Brassworks Launcher.app" 129 335 \
              --app-drop-link 400 332 \
              "$DMG" \
              "$STAGING" && break
            echo "create-dmg attempt $attempt failed, retrying..."
            rm -f "$DMG"
            sleep 5
          done

          if [ ! -f "$DMG" ]; then
            echo "::error::Failed to build Brassworks.dmg"
            exit 1
          fi

          gh release upload "$TAG" "$DMG" --clobber

  publish:
    name: Publish release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      # Publishing the draft is what creates the git tag and makes
      # releases/latest/download/latest.json live for the auto updater.
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          gh release edit "$TAG" --repo "$REPO" --draft=false --latest